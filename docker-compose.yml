# ============================================================
# GPU 部署（默认）:
#   docker compose up -d
#
# CPU 部署:
#   docker compose --profile cpu up -d
#
# 前置条件:
#   - 模型文件: 确保 models/m3e_base/ 目录存在（约 400MB）
#   - GPU 服务器: 需装 nvidia-container-toolkit
#     https://docs.nvidia.com/datacenter/cloud-native/container-toolkit/latest/install-guide.html
# ============================================================

services:
  lexagg-gpu:
    profiles: [""]  # 默认 profile
    build:
      context: .
      args:
        # PyTorch CUDA 12.8 wheel 源
        TORCH_INDEX: "https://download.pytorch.org/whl/cu128"
    image: lexagg:latest
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    restart: unless-stopped

  lexagg-cpu:
    profiles: ["cpu"]
    build:
      context: .
      # 不传 TORCH_INDEX → 保留 CPU 版 torch
    image: lexagg:cpu
    ports:
      - "8000:8000"
    volumes:
      - ./models:/app/models
      - ./data:/app/data
    environment:
      - HF_HUB_OFFLINE=1
      - TRANSFORMERS_OFFLINE=1
    restart: unless-stopped
